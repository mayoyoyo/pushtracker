<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 100" fill="none">
  <!-- Clean pictogram style -->

  <!-- Person silhouette (front-facing pushup, simplified) -->
  <!-- Head -->
  <circle cx="155" cy="28" r="10" fill="#a1a1aa"/>
  <!-- Shoulders -->
  <rect x="135" y="40" width="40" height="14" rx="7" fill="#a1a1aa"/>
  <!-- Arms going down -->
  <rect x="128" y="42" width="8" height="30" rx="4" fill="#71717a"/>
  <rect x="179" y="42" width="8" height="30" rx="4" fill="#71717a"/>
  <!-- Hands -->
  <circle cx="132" cy="74" r="4" fill="#71717a"/>
  <circle cx="183" cy="74" r="4" fill="#71717a"/>

  <!-- Floor line -->
  <line x1="100" y1="82" x2="210" y2="82" stroke="#3f3f46" stroke-width="1.5"/>

  <!-- Phone (portrait, flat on floor, in front of person) -->
  <rect x="50" y="62" width="22" height="34" rx="4" fill="#27272a" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="53" y="66" width="16" height="26" rx="2" fill="#18181b"/>
  <circle cx="61" cy="64" r="1.5" fill="#22c55e"/>

  <!-- Dotted line from phone to person -->
  <line x1="72" y1="72" x2="125" y2="40" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="122,43 127,36 130,45" fill="#22c55e"/>

  <!-- Labels -->
  <text x="61" y="14" text-anchor="middle" fill="#71717a" font-size="10" font-family="system-ui">phone</text>
  <text x="155" y="14" text-anchor="middle" fill="#71717a" font-size="10" font-family="system-ui">you</text>
</svg>
