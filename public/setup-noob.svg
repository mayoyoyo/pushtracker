<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 180" fill="none">
  <!-- Floor -->
  <line x1="20" y1="150" x2="280" y2="150" stroke="#3f3f46" stroke-width="2"/>

  <!-- Person doing pushup (front view, simplified) -->
  <!-- Head -->
  <circle cx="150" cy="60" r="16" stroke="#a1a1aa" stroke-width="2"/>
  <!-- Eyes -->
  <circle cx="144" cy="58" r="2" fill="#a1a1aa"/>
  <circle cx="156" cy="58" r="2" fill="#a1a1aa"/>
  <!-- Body -->
  <line x1="150" y1="76" x2="150" y2="110" stroke="#a1a1aa" stroke-width="2"/>
  <!-- Arms (extended down to floor in pushup) -->
  <line x1="150" y1="85" x2="115" y2="148" stroke="#a1a1aa" stroke-width="2"/>
  <line x1="150" y1="85" x2="185" y2="148" stroke="#a1a1aa" stroke-width="2"/>
  <!-- Hands on floor -->
  <circle cx="115" cy="148" r="3" fill="#a1a1aa"/>
  <circle cx="185" cy="148" r="3" fill="#a1a1aa"/>

  <!-- Phone on floor below person -->
  <rect x="135" y="140" width="30" height="18" rx="3" stroke="#22c55e" stroke-width="2" fill="#18181b"/>
  <!-- Camera dot -->
  <circle cx="150" cy="144" r="2" fill="#22c55e"/>

  <!-- Arrow from phone to person's face -->
  <line x1="150" y1="138" x2="150" y2="82" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="146,86 150,78 154,86" fill="#22c55e"/>

  <!-- Label -->
  <text x="150" y="175" text-anchor="middle" fill="#a1a1aa" font-size="11" font-family="system-ui">Phone in front, facing you</text>
</svg>
