<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 220" fill="none">
  <!-- Floor -->
  <rect x="10" y="155" width="320" height="40" rx="4" fill="#18181b" stroke="#27272a" stroke-width="1"/>

  <!-- Person in pushup position (SIDE VIEW - clear profile) -->
  <!-- Head on left -->
  <circle cx="55" cy="100" r="16" fill="#27272a" stroke="#a1a1aa" stroke-width="2"/>
  <!-- Eye -->
  <circle cx="50" cy="98" r="2" fill="#a1a1aa"/>

  <!-- Torso — long plank going right -->
  <line x1="71" y1="104" x2="200" y2="122" stroke="#a1a1aa" stroke-width="3" stroke-linecap="round"/>

  <!-- Arm (bent at elbow — in pushup down position) -->
  <line x1="71" y1="104" x2="60" y2="130" stroke="#a1a1aa" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="60" y1="130" x2="55" y2="155" stroke="#a1a1aa" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="55" cy="155" r="4" fill="#3f3f46" stroke="#a1a1aa" stroke-width="1.5"/>

  <!-- Hip -->
  <circle cx="200" cy="122" r="3" fill="#3f3f46"/>

  <!-- Upper leg -->
  <line x1="200" y1="122" x2="220" y2="128" stroke="#a1a1aa" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Knee -->
  <circle cx="220" cy="128" r="2" fill="#3f3f46"/>
  <!-- Lower leg -->
  <line x1="220" y1="128" x2="240" y2="155" stroke="#a1a1aa" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Foot -->
  <circle cx="240" cy="155" r="4" fill="#3f3f46" stroke="#a1a1aa" stroke-width="1.5"/>

  <!-- Phone propped up on RIGHT, good distance away -->
  <rect x="290" y="115" width="16" height="44" rx="4" fill="#27272a" stroke="#22c55e" stroke-width="2"/>
  <rect x="293" y="119" width="10" height="36" rx="2" fill="#09090b"/>
  <circle cx="298" cy="135" r="3" fill="#22c55e"/>
  <text x="298" y="170" text-anchor="middle" fill="#22c55e" font-size="9" font-family="system-ui" font-weight="600">PHONE</text>

  <!-- Arrow from phone pointing at person -->
  <line x1="288" y1="135" x2="252" y2="135" stroke="#22c55e" stroke-width="2" stroke-dasharray="5 4"/>
  <polygon points="256,131 248,135 256,139" fill="#22c55e"/>

  <!-- Full body bracket on far left -->
  <path d="M30 80 L24 80 L24 162 L30 162" stroke="#22c55e" stroke-width="2" fill="none"/>
  <text x="15" y="125" text-anchor="middle" fill="#22c55e" font-size="10" font-family="system-ui" font-weight="600" transform="rotate(-90 15 125)">FULL BODY</text>

  <!-- Label -->
  <text x="170" y="208" text-anchor="middle" fill="#a1a1aa" font-size="12" font-family="system-ui">Phone to your side, seeing full body</text>
</svg>
