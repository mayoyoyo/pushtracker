<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 100" fill="none">
  <!-- Clean pictogram style - side view -->

  <!-- Person silhouette (side-view pushup plank) -->
  <!-- Head -->
  <circle cx="48" cy="38" r="10" fill="#a1a1aa"/>
  <!-- Torso (long plank) -->
  <rect x="55" y="44" width="100" height="10" rx="5" fill="#a1a1aa" transform="rotate(5 55 44)"/>
  <!-- Arm (bent) -->
  <rect x="50" y="48" width="7" height="28" rx="3.5" fill="#71717a" transform="rotate(-5 50 48)"/>
  <!-- Hand -->
  <circle cx="48" cy="77" r="3.5" fill="#71717a"/>
  <!-- Leg -->
  <rect x="148" y="52" width="7" height="26" rx="3.5" fill="#71717a" transform="rotate(8 148 52)"/>
  <!-- Foot -->
  <circle cx="153" cy="77" r="3.5" fill="#71717a"/>

  <!-- Floor line -->
  <line x1="25" y1="82" x2="260" y2="82" stroke="#3f3f46" stroke-width="1.5"/>

  <!-- Phone (portrait, propped up, to the right) -->
  <rect x="215" y="48" width="20" height="34" rx="4" fill="#27272a" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="218" y="52" width="14" height="26" rx="2" fill="#18181b"/>
  <circle cx="225" cy="50" r="1.5" fill="#22c55e"/>

  <!-- Dotted line from phone to person -->
  <line x1="215" y1="65" x2="165" y2="62" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="168,59 162,62 168,65" fill="#22c55e"/>

  <!-- Full body bracket -->
  <line x1="35" y1="24" x2="35" y2="85" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="35" y1="24" x2="40" y2="24" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="35" y1="85" x2="40" y2="85" stroke="#22c55e" stroke-width="1.5"/>

  <!-- Labels -->
  <text x="225" y="14" text-anchor="middle" fill="#71717a" font-size="10" font-family="system-ui">phone</text>
  <text x="100" y="24" text-anchor="middle" fill="#71717a" font-size="10" font-family="system-ui">you (side view)</text>
  <text x="27" y="58" text-anchor="middle" fill="#22c55e" font-size="8" font-family="system-ui" transform="rotate(-90 27 58)">full body</text>
</svg>
